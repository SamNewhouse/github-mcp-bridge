name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      # Fixture and temp files never affect production behaviour — skip CI
      - 'tests/fixtures/**'
      - '**/*.tmp'
      - '**/*.temp'
      - '**/tmp/**'
      - '**/temp/**'
  push:
    branches: [main]
    paths-ignore:
      - 'tests/fixtures/**'
      - '**/*.tmp'
      - '**/*.temp'
      - '**/tmp/**'
      - '**/temp/**'

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    # Unit tests MUST NOT reach the network. Any test that tries a real fetch
    # will fail immediately because no PAT/server is available — this is the
    # intended safeguard.
    env:
      # Explicitly absent: GITHUB_PAT, CONNECTOR_SECRET, PORT
      # If any unit test imports githubRequest without mocking it, the missing
      # PAT will throw at config-load time, failing fast.
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration tests (read-only)
    runs-on: ubuntu-latest
    # WRITE-SAFETY CONTRACT:
    # This job connects to a live GitHub PAT. All tests in
    # tests/integration/tools.integration.ts MUST be read-only.
    # Mutation tools (create, upsert, patch, delete, update, add, link)
    # are covered exclusively by mocked unit tests in tests/unit/.
    # Never add a live mutation call to this job.
    env:
      GITHUB_PAT: ${{ secrets.GH_PAT }}
      CONNECTOR_SECRET: ${{ secrets.CONNECTOR_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
