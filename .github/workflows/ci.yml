name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: TypeScript type-check
  # ─────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm test

  # ─────────────────────────────────────────────────────
  # Job 2: Integration tests against live Vercel deployment
  # Requires secrets: CONNECTOR_SECRET, VERCEL_DEPLOYMENT_URL
  # ─────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: node .github/scripts/integration-test.mjs
        env:
          BASE: ${{ secrets.VERCEL_DEPLOYMENT_URL }}
          SECRET: ${{ secrets.CONNECTOR_SECRET }}
          OWNER: SamNewhouse
          REPO: github-mcp-bridge
