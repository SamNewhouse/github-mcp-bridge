name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: TypeScript type-check
  # ─────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm test

  # ─────────────────────────────────────────────────────
  # Job 2: Integration tests
  # ─────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: node dist/server.js &
        env:
          PORT: 3000
          CONNECTOR_SECRET: ${{ secrets.CONNECTOR_SECRET }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}

      - name: Wait for server
        run: |
          echo "Waiting for server to be ready..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            echo "  attempt ${i}/20..."
            sleep 1
          done
          echo "ERROR: Server did not become ready in time"
          exit 1

      - name: Run integration tests
        run: node .github/scripts/integration-test.mjs
        env:
          BASE: http://localhost:3000
          SECRET: ${{ secrets.CONNECTOR_SECRET }}
          OWNER: SamNewhouse
          REPO: github-mcp-bridge
